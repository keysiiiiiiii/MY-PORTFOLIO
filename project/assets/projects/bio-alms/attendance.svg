  </g>
  <rect x="280" y="40" width="0" height="640"/>
  <rect x="40" y="40" width="220" height="640" rx="16" fill="#0f1a30" stroke="#1f2a44"/>
  <g font-family="Inter, sans-serif" font-size="13" fill="#93a4c0">
    <rect x="60" y="80" width="180" height="36" rx="6" fill="#1d4ed8"/>
    <text x="80" y="103" fill="#fff" font-weight="600">Dashboard</text>
    <rect x="60" y="130" width="180" height="36" rx="6" fill="#16213d"/>
    <text x="80" y="153" fill="#e6edf6">Attendance</text>
    <rect x="60" y="180" width="180" height="36" rx="6" fill="#16213d"/>
    <text x="80" y="203" fill="#e6edf6">Leave Requests</text>
    <rect x="60" y="230" width="180" height="36" rx="6" fill="#16213d"/>
    <text x="80" y="253" fill="#e6edf6">Forecasting</text>
    <rect x="60" y="280" width="180" height="36" rx="6" fill="#16213d"/>
    <text x="80" y="303" fill="#e6edf6">Reports</text>
