<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Bio-ALMS Attendance view">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172554"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg2)"/>
  <rect x="280" y="40" width="960" height="640" rx="16" fill="#0f1a30" stroke="#1f2a44"/>
  <text x="320" y="100" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#f5f9ff">Attendance Log</text>
  <rect x="320" y="130" width="880" height="44" rx="8" fill="#16213d"/>
  <g font-family="Inter, sans-serif" font-size="13" fill="#93a4c0" font-weight="600">
