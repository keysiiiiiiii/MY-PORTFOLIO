    <rect x="320" y="290" width="880" height="44" rx="8" fill="#111a2e"/>
    <text x="340" y="317">Santos, A.</text>
    <text x="620" y="317">—</text>
    <text x="780" y="317">—</text>
    <rect x="950" y="304" width="70" height="20" rx="10" fill="#38bdf822" stroke="#38bdf8" stroke-opacity=".5"/>
    <text x="970" y="318" fill="#38bdf8">On leave</text>

    <rect x="320" y="342" width="880" height="44" rx="8" fill="#0f1a30"/>
    <text x="340" y="369">Cruz, P.</text>
    <text x="620" y="369">07:55 AM</text>
    <text x="780" y="369">05:05 PM</text>
    <rect x="950" y="356" width="70" height="20" rx="10" fill="#10b98122" stroke="#10b981" stroke-opacity=".5"/>
