    <rect x="320" y="238" width="880" height="44" rx="8" fill="#0f1a30"/>
    <text x="340" y="265">Reyes, M.</text>
    <text x="620" y="265">09:15 AM</text>
    <text x="780" y="265">06:00 PM</text>
    <rect x="950" y="252" width="60" height="20" rx="10" fill="#f59e0b22" stroke="#f59e0b" stroke-opacity=".5"/>
